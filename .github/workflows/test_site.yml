name: Test Deployed Website

on:
  workflow_dispatch:       # allows manual run
  schedule:
    - cron: '0 * * * *'   # optional, runs every hour

jobs:
  test-site:
    runs-on: ubuntu-latest
    steps:
      - name: Test homepage accessibility
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" https://willmatth.github.io/IoT_development/)
          if [ "$STATUS" -ne 200 ]; then
            echo "Website is down! Status: $STATUS"
            exit 1
          else
            echo "Website is up! Status: $STATUS"
          fi

      - name: Check homepage contains key text
        run: |
          curl -s https://willmatth.github.io/IoT_development/ | grep -q "Futuristic IoT Project"
          if [ $? -ne 0 ]; then
            echo "Key text missing!"
            exit 1
          else
            echo "Key text found — homepage looks good."
          fi
